<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --primary: #fdf6f0; --accent: #d4a373; --text: #4a4a4a; --white: #ffffff; }
        body { font-family: 'Georgia', serif; background-color: var(--primary); color: var(--text); margin: 0; }
        header { padding: 40px; text-align: center; background: var(--white); }
        .hero { height: 400px; display: flex; align-items: center; justify-content: center; 
                flex-direction: column; background: #e9edc9; margin: 20px; border-radius: 15px; }
        .btn { background: var(--text); color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .sub-box { background: var(--accent); color: white; padding: 40px; text-align: center; margin: 40px 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <header>
        <h1>ETHEREAL ANN</h1>
        <p>Boxes that are good for your sould</p>
    </header>

    <section class="hero">
        <h2>Our Collections</h2>
        <p>A touch of magic, delivered monthly.</p>
        <!-- I SANDWICHED THE BUTTON BELOW FOR YOU -->
        <a href="themes.html">
            <button class="btn">View Themes</button>
        </a>
    </section>

    <section class="sub-box">
        <h3>Join the Inner Circle</h3>
        <input type="email" placeholder="Enter your email...">
        <button class="btn">Subscribe Now</button>
    </section>
</body>
</html>
